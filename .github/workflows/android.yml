name: Music Player Android Test, Build & Store

on:
  workflow_dispatch:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  bump-version:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main (merged PR)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Git user
        run: |
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"
          git config --global user.name "${{ github.actor }}"
      - name: Bump version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x bump_version.sh
          ./bump_version.sh
      - name: Commit and push version bump
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add pubspec.yaml
          git diff --cached --quiet && exit 0
          git commit -m "Bump version code"
          git push origin main

  build-and-deploy:
    needs: bump-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install FVM
        run: |
          curl -fsSL https://fvm.app/install.sh | bash
          echo "$HOME/fvm/bin" >> $GITHUB_PATH

      - name: Install Flutter SDK via FVM
        run: |
          VERSION=$(jq -r '.flutter' .fvmrc)
          echo "Installing Flutter $VERSION via FVM"
          fvm install $VERSION
          fvm use $VERSION --force

      - name: Flutter doctor
        run: fvm flutter doctor

      - name: Install dependencies
        run: fvm flutter pub get

      - name: Generate code
        run: fvm flutter pub run build_runner build --delete-conflicting-outputs

      - name: Run tests
        run: fvm flutter test

      - name: Set up Java (JetBrains JDK for KGP toolchain)
        uses: actions/setup-java@v5
        with:
          distribution: jetbrains
          java-version: 21

      - name: Set build type flag
        run: echo "BUILD_TYPE=release" >> $GITHUB_ENV

      - name: Cache Gradle wrapper, dependencies and Flutter pub packages (release only)
        if: env.BUILD_TYPE == 'release'
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.pub-cache
          key: |
            gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties', 'android/build.gradle*', 'android/app/build.gradle*') }}
            flutter-${{ hashFiles('pubspec.yaml', 'pubspec.lock') }}
          restore-keys: |
            gradle-
            flutter-

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore

      - name: Build Android App Bundle – Android Auto (auto flavor)
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          fvm flutter build appbundle \
            --release \
            --flavor auto \
            -t lib/main.dart   # adjust if you use a different entrypoint

      - name: Build Android App Bundle – Automotive OS (automotive flavor)
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          fvm flutter build appbundle \
            --release \
            --flavor automotive \
            -t lib/main.dart   # adjust if you use a different entrypoint

      - name: Upload Android Auto bundle to Google Play (Alpha)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.cenkt.music_player
          releaseFiles: build/app/outputs/bundle/autoRelease/app-auto-release.aab
          track: alpha
          status: draft

      - name: Upload Automotive‑OS bundle to Google Play (Beta)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.cenkt.music_player
          releaseFiles: build/app/outputs/bundle/automotiveRelease/app-automotive-release.aab
          track: beta
          status: draft

      - name: Upload auto flavor AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-auto-release-aab
          path: build/app/outputs/bundle/autoRelease/app-auto-release.aab

      - name: Upload automotive flavor AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-automotive-release-aab
          path: build/app/outputs/bundle/automotiveRelease/app-automotive-release.aab
